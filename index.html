<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>YOLUVAMI POS Profesional</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
margin:0;
font-family:Poppins;
background:#f3f4f6
}

header{
background:#1e3a8a;
color:white;
padding:18px;
text-align:center;
font-weight:700;
font-size:18px
}

.container{
padding:15px;
max-width:700px;
margin:auto
}

.card{
background:white;
padding:18px;
border-radius:20px;
margin-bottom:20px;
box-shadow:0 10px 25px rgba(0,0,0,.08)
}

input,select,button{
padding:12px;
border-radius:12px;
border:1px solid #ddd;
margin-bottom:10px;
width:100%;
font-size:14px
}

button{
background:#2563eb;
color:white;
border:none;
font-weight:600;
cursor:pointer
}

.deleteBtn{
background:#dc2626
}

table{
width:100%;
border-collapse:collapse
}

th,td{
padding:8px;
border-bottom:1px solid #eee
}

.product-row{
display:flex;
align-items:center;
gap:10px
}

.product-row img{
width:40px;
border-radius:8px
}

.totalBox{
font-size:22px;
font-weight:700;
color:#059669
}

.alerta{
background:#fee2e2;
padding:10px;
border-radius:10px;
margin-top:10px;
color:#b91c1c;
font-weight:600
}

canvas{
width:100%!important;
height:250px!important
}

</style>
</head>

<body>

<header>YOLUVAMI POS PROFESIONAL</header>

<div class="container">

<div class="card">

<h3>Registrar Venta</h3>

<input id="buscar" placeholder="Buscar producto">

<select id="producto"></select>

<input type="number" id="cantidad" placeholder="Cantidad">

<button onclick="agregar()">Agregar Producto</button>

<table>

<thead>
<tr>
<th>Producto</th>
<th>Cant</th>
<th>Subtotal</th>
<th></th>
</tr>
</thead>

<tbody id="tabla"></tbody>

</table>

<div class="totalBox">
Total C$ <span id="total">0</span>
</div>

<button onclick="finalizar()">Finalizar Venta</button>

</div>


<div class="card">

<h3>Dashboard de Ventas</h3>

<div id="dashboard"></div>

<canvas id="grafica"></canvas>

</div>

<div class="card">

<h3>Historial</h3>

<div id="historial"></div>

</div>

</div>


<script>

/* INVENTARIO PERMANENTE */

let inventario = JSON.parse(localStorage.getItem("inventarioYoluvami")) || [

{name:"Mobil Special 20W-50",price:1060,stock:10,img:"30.jpeg",vendidos:0},
{name:"CLEAN ALL",price:180,stock:5,img:"cleanall.jpg",vendidos:0},
{name:"Freezetone Radiator",price:230,stock:8,img:"freezetone.jpg",vendidos:0},
{name:"Flamingo Foam Cleaner",price:150,stock:3,img:"flamingo.jpg",vendidos:0},
{name:"Shell Advance AX5 20W-50",price:280,stock:6,img:"shell.jpg",vendidos:0},
{name:"Letrero Taxi LED",price:600,stock:4,img:"taxi.jpg",vendidos:0},
{name:"Forro para Timón",price:450,stock:7,img:"timon.jpg",vendidos:0}

]

let historial = JSON.parse(localStorage.getItem("ventasYoluvami")) || []

let ventaActual=[]

const select=document.getElementById("producto")

function cargarProductos(){

select.innerHTML=""

inventario.forEach((p,i)=>{

select.innerHTML+=`<option value="${i}">${p.name} - C$${p.price} (Stock ${p.stock})</option>`

})

}

cargarProductos()


/* AGREGAR PRODUCTO */

function agregar(){

let i=select.value
let cantidad=parseInt(document.getElementById("cantidad").value)

if(!cantidad)return

let p=inventario[i]

if(p.stock<cantidad){

alert("Producto agotado")

return

}

p.stock-=cantidad
p.vendidos+=cantidad

let subtotal=p.price*cantidad

ventaActual.push({...p,cantidad,subtotal})

guardarInventario()

renderVenta()

}


/* GUARDAR INVENTARIO */

function guardarInventario(){

localStorage.setItem("inventarioYoluvami",JSON.stringify(inventario))

}


/* TABLA VENTA */

function renderVenta(){

let tabla=document.getElementById("tabla")

tabla.innerHTML=""

let total=0

ventaActual.forEach((p,i)=>{

total+=p.subtotal

tabla.innerHTML+=`

<tr>

<td class="product-row">

<img src="${p.img}">
${p.name}

</td>

<td>${p.cantidad}</td>

<td>C$${p.subtotal}</td>

<td><button class="deleteBtn" onclick="borrar(${i})">X</button></td>

</tr>

`

})

document.getElementById("total").innerText=total

}


/* ELIMINAR */

function borrar(i){

ventaActual.splice(i,1)

renderVenta()

}


/* FINALIZAR VENTA */

function finalizar(){

if(ventaActual.length==0)return

let total=ventaActual.reduce((a,b)=>a+b.subtotal,0)

let venta={

fecha:new Date().toLocaleString(),
productos:ventaActual,
total

}

historial.push(venta)

localStorage.setItem("ventasYoluvami",JSON.stringify(historial))

generarFactura(venta)

ventaActual=[]

renderVenta()

mostrarHistorial()

cargarProductos()

}


/* FACTURA AUTOMATICA */

async function generarFactura(v){

const {jsPDF}=window.jspdf

let doc=new jsPDF()

doc.text("Factura YOLUVAMI",70,20)

let y=40

v.productos.forEach(p=>{

doc.text(`${p.name} x${p.cantidad} C$${p.subtotal}`,10,y)

y+=10

})

doc.text(`Total: C$${v.total}`,10,y+10)

doc.save("Factura_YOLUVAMI.pdf")

}


/* HISTORIAL */

function mostrarHistorial(){

let div=document.getElementById("historial")

div.innerHTML=""

let ingresos=0

historial.forEach(v=>{

ingresos+=v.total

div.innerHTML+=`

<div class="card">

${v.fecha}

<br>

Total C$${v.total}

</div>

`

})

crearDashboard(ingresos)

}


/* DASHBOARD */

function crearDashboard(ingresos){

let vendidos=inventario.sort((a,b)=>b.vendidos-a.vendidos)

let top=vendidos[0]

document.getElementById("dashboard").innerHTML=`

Total Ingresos: <b>C$${ingresos}</b>

<br><br>

Producto más vendido:

<b>${top.name}</b> (${top.vendidos})

${top.stock<=2?'<div class="alerta">⚠ Producto casi agotado</div>':''}

`

crearGrafica()

}


/* GRAFICA */

function crearGrafica(){

let ctx=document.getElementById("grafica")

let labels=inventario.map(p=>p.name)

let data=inventario.map(p=>p.vendidos)

new Chart(ctx,{

type:"bar",

data:{
labels:labels,
datasets:[{
label:"Productos vendidos",
data:data
}]
}

})

}


mostrarHistorial()

</script>

</body>
</html>
