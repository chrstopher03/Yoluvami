<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>YOLUVAMI Sistema Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1e3a8a">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
margin:0;
font-family:Poppins;
background:#f3f4f6
}

header{
background:#1e3a8a;
color:white;
padding:18px;
text-align:center;
font-size:18px;
font-weight:700
}

.container{
padding:15px;
max-width:600px;
margin:auto
}

.card{
background:white;
padding:18px;
border-radius:20px;
margin-bottom:20px;
box-shadow:0 10px 25px rgba(0,0,0,.08)
}

input, select, button{
width:100%;
padding:12px;
border-radius:12px;
border:1px solid #ddd;
margin:10px 0;
font-size:14px;
box-sizing:border-box;
display:block;
}
button{
background:linear-gradient(135deg,#1e3a8a,#2563eb);
color:white;
border:none;
font-weight:600;
cursor:pointer
}

button:active{
transform:scale(.97)
}

.deleteBtn{
background:#dc2626
}

.logoutBtn{
background:#111
}

table{
width:100%;
border-collapse:collapse;
font-size:13px
}

th,td{
padding:8px;
border-bottom:1px solid #eee
}

.product-row{
display:flex;
align-items:center;
gap:10px
}

.product-row img{
width:40px;
border-radius:8px
}

img.preview{
width:100px;
border-radius:12px;
margin:10px 0
}

.totalVentaBox{
font-size:20px;
font-weight:700;
color:#059669;
margin-top:10px
}

canvas{
width:100%!important;
height:300px!important
}

/* LOGIN */
#loginScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#1e3a8a;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
padding:20px; /* espacio lateral para móvil */
box-sizing:border-box;
}

.loginBox{
background:white;
padding:30px;
border-radius:20px;
width:100%;
max-width:340px;
text-align:center;
margin:auto;
box-shadow:0 15px 40px rgba(0,0,0,.2);
}

</style>

</head>

<body>

<div id="loginScreen">

<div class="loginBox">

<h2>Acceso</h2>

<input type="text" id="usuario" placeholder="Usuario">
<input type="password" id="clave" placeholder="Contraseña">

<button onclick="login()">Ingresar</button>

<p id="errorLogin" style="color:red"></p>

</div>

</div>

<header>

YOLUVAMI

<div style="font-size:13px;margin-top:5px">
Usuario: <span id="usuarioActivo"></span>
</div>

<button id="instalarBtn">📲 Instalar Aplicación</button>
<button class="logoutBtn" onclick="logout()">Cerrar sesión</button>

</header>

<div class="container">

<div class="card">

<h3>Registrar Venta</h3>

<input type="text" id="buscador" placeholder="Buscar producto...">

<select id="productoSelect"></select>

<img id="imgPreview" class="preview">

<input type="number" id="cantidad" placeholder="Cantidad" min="1">

<button onclick="agregarVenta()">Agregar Producto</button>

<table>

<thead>
<tr>
<th>Producto</th>
<th>Cant</th>
<th>Subtotal</th>
<th></th>
</tr>
</thead>

<tbody id="tablaVenta"></tbody>

</table>

<div class="totalVentaBox">
Total: C$<span id="totalVenta">0</span>
</div>

<button onclick="finalizarVenta()">Finalizar Venta</button>

</div>

<div class="card">

<h3>Historial del Día</h3>

<div id="historial"></div>

</div>

<div class="card">

<h3>Resumen General</h3>

<div id="resumen"></div>

</div>

</div>

<script>

/* USUARIOS */

const usuariosSistema=[
{user:"michelle",pass:"1234",rol:"jefa"},
{user:"auner",pass:"1234",rol:"trabajador"},
{user:"luis",pass:"1234",rol:"trabajador"}
]

let usuarioActual=null

function login(){

const user=document.getElementById("usuario").value.toLowerCase()
const pass=document.getElementById("clave").value

const encontrado=usuariosSistema.find(u=>u.user===user&&u.pass===pass)

if(encontrado){

usuarioActual=encontrado

localStorage.setItem("usuarioActivo",JSON.stringify(encontrado))

document.getElementById("loginScreen").style.display="none"

document.getElementById("usuarioActivo").innerText=encontrado.user

}else{

document.getElementById("errorLogin").innerText="Usuario o contraseña incorrecta"

}

}

function logout(){

localStorage.removeItem("usuarioActivo")
location.reload()

}

window.addEventListener("load",()=>{

const guardado=localStorage.getItem("usuarioActivo")

if(guardado){

usuarioActual=JSON.parse(guardado)

document.getElementById("loginScreen").style.display="none"

document.getElementById("usuarioActivo").innerText=usuarioActual.user

}

})

/* PRODUCTOS */

const productos=[

{name:"Mobil Special 20W-50",price:1060,img:"30.jpeg",stock:10},
{name:"CLEAN ALL",price:180,img:"cleanall.jpg",stock:5},
{name:"Freezetone Radiator",price:230,img:"freezetone.jpg",stock:8},
{name:"Flamingo Foam Cleaner",price:150,img:"flamingo.jpg",stock:3},
{name:"Shell Advance AX5 20W-50",price:280,img:"shell.jpg",stock:6},
{name:"Letrero Taxi LED",price:600,img:"taxi.jpg",stock:4},
{name:"Forro para Timón",price:450,img:"timon.jpg",stock:7}

]

let ventaActual=[]
let historial=JSON.parse(localStorage.getItem("ventasYoluvami"))||[]

const select=document.getElementById("productoSelect")
const buscador=document.getElementById("buscador")
const imgPreview=document.getElementById("imgPreview")

function cargarProductos(lista){

select.innerHTML=""

lista.forEach(p=>{

select.innerHTML+=`<option value="${productos.indexOf(p)}">
${p.name} - C$${p.price} (Stock: ${p.stock})
</option>`

})

mostrarImagen()

}

cargarProductos(productos)

buscador.addEventListener("input",()=>{

const texto=buscador.value.toLowerCase()

cargarProductos(
productos.filter(p=>p.name.toLowerCase().includes(texto))
)

})

function mostrarImagen(){

if(productos[select.value]){
imgPreview.src=productos[select.value].img
}

}

select.addEventListener("change",mostrarImagen)

function agregarVenta(){

const index=select.value
const cantidad=parseInt(document.getElementById("cantidad").value)

if(!cantidad||cantidad<=0)return alert("Cantidad inválida")

const producto=productos[index]

if(producto.stock<cantidad){
return alert("Stock insuficiente")
}

producto.stock-=cantidad

const subtotal=producto.price*cantidad

ventaActual.push({...producto,cantidad,subtotal})

actualizarTabla()

document.getElementById("cantidad").value=""

cargarProductos(productos)

}

function actualizarTabla(){

let total=0
const tbody=document.getElementById("tablaVenta")

tbody.innerHTML=""

ventaActual.forEach((p,i)=>{

total+=p.subtotal

tbody.innerHTML+=`

<tr>

<td class="product-row">
<img src="${p.img}">
${p.name}
</td>

<td>${p.cantidad}</td>

<td>C$${p.subtotal}</td>

<td>
<button class="deleteBtn" onclick="eliminar(${i})">X</button>
</td>

</tr>

`

})

document.getElementById("totalVenta").innerText=total

}

function eliminar(i){

ventaActual.splice(i,1)

actualizarTabla()

}

function finalizarVenta(){

if(ventaActual.length===0)return alert("No hay productos")

const fecha=new Date()

const total=ventaActual.reduce((acc,p)=>acc+p.subtotal,0)

historial.push({
fecha:fecha.toLocaleDateString(),
hora:fecha.toLocaleTimeString(),
productos:ventaActual,
total
})

localStorage.setItem("ventasYoluvami",JSON.stringify(historial))

ventaActual=[]

actualizarTabla()

mostrarHistorial()

}

function mostrarHistorial(){

const div=document.getElementById("historial")

div.innerHTML=""

let ingresos=0

historial.forEach((v,index)=>{

ingresos+=v.total

let botonEliminar=""

if(usuarioActual && usuarioActual.rol==="jefa"){

botonEliminar=`<button class="deleteBtn" onclick="borrarRegistro(${index})">Eliminar</button>`

}

div.innerHTML+=`

<div style="background:#f9fafc;padding:15px;border-radius:12px;margin-bottom:12px">

<div><strong>${v.fecha} - ${v.hora}</strong></div>

<p>Total: C$${v.total}</p>

${botonEliminar}

</div>

`

})

document.getElementById("resumen").innerHTML=`
<p><strong>Total Ingresos:</strong> C$${ingresos}</p>
<canvas id="grafica"></canvas>
<button onclick="exportarExcel()">Descargar Excel</button>
<button onclick="generarPDF()">Descargar PDF</button>
<button onclick="enviarWhatsApp()">Enviar WhatsApp</button>
`

crearGrafica()

}

let graficaActual=null

function crearGrafica(){

const ctx=document.getElementById("grafica")

if(!ctx)return

if(graficaActual)graficaActual.destroy()

const meses={}

historial.forEach(v=>{

let mes=v.fecha.split("/")[1]

meses[mes]=(meses[mes]||0)+v.total

})

graficaActual=new Chart(ctx,{
type:"bar",
data:{
labels:Object.keys(meses),
datasets:[{
label:"Ingresos por Mes",
data:Object.values(meses)
}]
}
})

}

function exportarExcel(){

const wb=XLSX.utils.book_new()

const ws=XLSX.utils.json_to_sheet(historial)

XLSX.utils.book_append_sheet(wb,ws,"Ventas")

XLSX.writeFile(wb,"Ventas_YOLUVAMI.xlsx")

}

async function generarPDF(){

const { jsPDF }=window.jspdf

const doc=new jsPDF()

let y=20

doc.setFontSize(16)

doc.text("YOLUVAMI Reporte",70,y)

y+=15

let totalGeneral=0

historial.forEach(v=>{

doc.text(`${v.fecha} ${v.hora} - C$${v.total}`,10,y)

y+=8

totalGeneral+=v.total

})

doc.text(`TOTAL GENERAL: C$${totalGeneral}`,10,y+10)

doc.save("Factura_YOLUVAMI.pdf")

}

function enviarWhatsApp(){

let mensaje="📊 Resumen YOLUVAMI\n"

let total=0

historial.forEach(v=>{

mensaje+=`${v.fecha} ${v.hora} - C$${v.total}\n`

total+=v.total

})

mensaje+=`\nTotal General: C$${total}`

window.open(`https://wa.me/?text=${encodeURIComponent(mensaje)}`)

}

mostrarHistorial()

/* PWA */

if("serviceWorker" in navigator){

window.addEventListener("load",()=>{

navigator.serviceWorker.register("sw.js");

});

}

let deferredPrompt;

window.addEventListener("beforeinstallprompt",(e)=>{

e.preventDefault();

deferredPrompt=e;

document.getElementById("instalarBtn").style.display="block";

});

document.getElementById("instalarBtn").addEventListener("click",async ()=>{

if(deferredPrompt){

deferredPrompt.prompt();

await deferredPrompt.userChoice;

deferredPrompt=null;

}

});
</script>

</body>
</html>
