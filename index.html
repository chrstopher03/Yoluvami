<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>YOLUVAMI Sistema Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1e3a8a">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
margin:0;
font-family:Poppins;
background:#f3f4f6
}

header{
background:#1e3a8a;
color:white;
padding:18px;
text-align:center;
font-size:18px;
font-weight:700
}

.container{
padding:15px;
max-width:600px;
margin:auto
}

.card{
background:white;
padding:18px;
border-radius:20px;
margin-bottom:20px;
box-shadow:0 10px 25px rgba(0,0,0,.08)
}

input,select,button{
padding:12px;
border-radius:12px;
border:1px solid #ddd;
margin-bottom:10px;
width:100%;
font-size:14px
}

button{
background:linear-gradient(135deg,#1e3a8a,#2563eb);
color:white;
border:none;
font-weight:600;
cursor:pointer
}

.deleteBtn{
background:#dc2626
}

table{
width:100%;
border-collapse:collapse;
font-size:13px
}

th,td{
padding:8px;
border-bottom:1px solid #eee
}

.product-row{
display:flex;
align-items:center;
gap:10px
}

.product-row img{
width:40px;
border-radius:8px
}

img.preview{
width:100px;
border-radius:12px;
margin:10px 0
}

.totalVentaBox{
font-size:20px;
font-weight:700;
color:#059669;
margin-top:10px
}

canvas{
width:100% !important;
height:300px !important
}

#instalarBtn{
display:none;
background:#059669
}
</style>
</head>

<body>

<header>YOLUVAMI Sistema Profesional</header>

<div class="container">

<div class="card">
<h3>Registrar Venta</h3>

<input type="text" id="buscador" placeholder="Buscar producto...">
<select id="productoSelect"></select>
<img id="imgPreview" class="preview">

<input type="number" id="cantidad" placeholder="Cantidad" min="1">
<button onclick="agregarVenta()">Agregar Producto</button>

<table>
<thead>
<tr>
<th>Producto</th>
<th>Cant</th>
<th>Subtotal</th>
<th></th>
</tr>
</thead>
<tbody id="tablaVenta"></tbody>
</table>

<div class="totalVentaBox">
Total: C$<span id="totalVenta">0</span>
</div>

<button onclick="finalizarVenta()">Finalizar Venta</button>
</div>

<div class="card">
<h3>Historial del Día</h3>
<div id="historial"></div>
</div>

<div class="card">
<h3>Resumen General</h3>
<div id="resumen"></div>
<button id="instalarBtn">📲 Instalar Aplicación</button>
</div>

</div>

<!-- LOGIN -->
<div id="loginScreen" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#1e3a8a;display:flex;align-items:center;justify-content:center;z-index:9999">

<div style="background:white;padding:30px;border-radius:20px;width:90%;max-width:350px;text-align:center">

<h2>Acceso</h2>

<input type="text" id="usuario" placeholder="Usuario">
<input type="password" id="clave" placeholder="Contraseña">

<button onclick="login()">Ingresar</button>

<p id="errorLogin" style="color:red"></p>

</div>
</div>

<script>

/* USUARIOS */
const usuarios={
"Michell03":"yoluvami2026",
"caja1":"1234",
"admin":"admin"
};

let usuarioActivo=localStorage.getItem("usuarioActivo");

if(usuarioActivo){
document.getElementById("loginScreen").style.display="none";
}

/* PRODUCTOS */

const productos=[
{name:"Mobil Special 20W-50",price:1060,img:"30.jpeg",stock:10},
{name:"CLEAN ALL",price:180,img:"cleanall.jpg",stock:5},
{name:"Freezetone Radiator",price:230,img:"freezetone.jpg",stock:8},
{name:"Flamingo Foam Cleaner",price:150,img:"flamingo.jpg",stock:3},
{name:"Shell Advance AX5 20W-50",price:280,img:"shell.jpg",stock:6},
{name:"Letrero Taxi LED",price:600,img:"taxi.jpg",stock:4},
{name:"Forro para Timón",price:450,img:"timon.jpg",stock:7}
];

let ventaActual=[];
let historial=JSON.parse(localStorage.getItem("ventasYoluvami"))||[];

const select=document.getElementById("productoSelect");
const buscador=document.getElementById("buscador");
const imgPreview=document.getElementById("imgPreview");

function cargarProductos(lista){
select.innerHTML="";
lista.forEach(p=>{
select.innerHTML+=`<option value="${productos.indexOf(p)}">${p.name} - C$${p.price} (Stock:${p.stock})</option>`;
});
mostrarImagen();
}

cargarProductos(productos);

buscador.addEventListener("input",()=>{
const texto=buscador.value.toLowerCase();
cargarProductos(productos.filter(p=>p.name.toLowerCase().includes(texto)));
});

function mostrarImagen(){
imgPreview.src=productos[select.value].img;
}

select.addEventListener("change",mostrarImagen);

/* AGREGAR VENTA */

function agregarVenta(){

const index=select.value;
const cantidad=parseInt(document.getElementById("cantidad").value);

if(!cantidad)return;

const producto=productos[index];

if(producto.stock<cantidad) return alert("Stock insuficiente");

producto.stock-=cantidad;

const subtotal=producto.price*cantidad;

ventaActual.push({...producto,cantidad,subtotal});

actualizarTabla();

document.getElementById("cantidad").value="";
}

/* TABLA */

function actualizarTabla(){

let total=0;
const tbody=document.getElementById("tablaVenta");

tbody.innerHTML="";

ventaActual.forEach((p,i)=>{

total+=p.subtotal;

tbody.innerHTML+=`
<tr>
<td class="product-row">
<img src="${p.img}">
${p.name}
</td>
<td>${p.cantidad}</td>
<td>C$${p.subtotal}</td>
<td><button class="deleteBtn" onclick="eliminar(${i})">X</button></td>
</tr>`;
});

document.getElementById("totalVenta").innerText=total;

}

function eliminar(i){

ventaActual.splice(i,1);
actualizarTabla();

}

/* FINALIZAR VENTA */

function finalizarVenta(){

if(ventaActual.length===0)return;

const fecha=new Date();

const total=ventaActual.reduce((a,b)=>a+b.subtotal,0);

historial.push({

fecha:fecha.toLocaleDateString(),
hora:fecha.toLocaleTimeString(),
usuario:usuarioActivo,
productos:ventaActual,
total

});

localStorage.setItem("ventasYoluvami",JSON.stringify(historial));

ventaActual=[];

actualizarTabla();

mostrarHistorial();

}

/* HISTORIAL */

function mostrarHistorial(){

const div=document.getElementById("historial");

div.innerHTML="";

let ingresos=0;

historial.forEach((v,i)=>{

ingresos+=v.total;

div.innerHTML+=`

<div style="background:#f9fafc;padding:15px;border-radius:12px;margin-bottom:12px">

<div><strong>${v.fecha} ${v.hora}</strong></div>
<div>👤 Vendió: <b>${v.usuario}</b></div>
<p>Total: C$${v.total}</p>

<button class="deleteBtn" onclick="borrarRegistro(${i})">Eliminar</button>

</div>

`;

});

document.getElementById("resumen").innerHTML=`<p><strong>Total Ingresos:</strong> C$${ingresos}</p><canvas id="grafica"></canvas>`;

crearGrafica();

}

function borrarRegistro(i){

if(confirm("Eliminar venta?")){

historial.splice(i,1);

localStorage.setItem("ventasYoluvami",JSON.stringify(historial));

mostrarHistorial();

}

}

/* GRAFICA */

let graficaActual;

function crearGrafica(){

const ctx=document.getElementById("grafica");

if(!ctx)return;

if(graficaActual)graficaActual.destroy();

const meses={};

historial.forEach(v=>{

let mes=v.fecha.split("/")[1];

meses[mes]=(meses[mes]||0)+v.total;

});

graficaActual=new Chart(ctx,{

type:"bar",

data:{
labels:Object.keys(meses),
datasets:[{label:"Ingresos",data:Object.values(meses)}]
}

});

}

/* LOGIN */

function login(){

const user=document.getElementById("usuario").value;
const pass=document.getElementById("clave").value;

if(usuarios[user] && usuarios[user]===pass){

localStorage.setItem("usuarioActivo",user);

usuarioActivo=user;

document.getElementById("loginScreen").style.display="none";

}else{

document.getElementById("errorLogin").innerText="Usuario incorrecto";

}

}

mostrarHistorial();

/* PWA */

if("serviceWorker" in navigator){

window.addEventListener("load",()=>{

navigator.serviceWorker.register("sw.js");

});

}

let deferredPrompt;

window.addEventListener("beforeinstallprompt",(e)=>{

e.preventDefault();

deferredPrompt=e;

document.getElementById("instalarBtn").style.display="block";

});

document.getElementById("instalarBtn").addEventListener("click",async ()=>{

if(deferredPrompt){

deferredPrompt.prompt();

await deferredPrompt.userChoice;

deferredPrompt=null;

}

});

</script>

</body>
</html>
